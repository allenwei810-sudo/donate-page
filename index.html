<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>请我喝杯咖啡 ☕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .emoji {
    font-size: 64px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #f7b731, #fc5c65);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .wallet-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: #888;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s;
  }

  .tab.active {
    background: linear-gradient(135deg, #f7b731, #fc5c65);
    color: #000;
  }

  .wallet-panel {
    display: none;
  }

  .wallet-panel.active {
    display: block;
  }

  .qr-wrapper {
    background: white;
    display: inline-block;
    padding: 12px;
    border-radius: 16px;
    margin-bottom: 20px;
  }

  .qr-wrapper img {
    display: block;
    width: 180px;
    height: 180px;
  }

  .address-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    word-break: break-all;
  }

  .address-text {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: #aaa;
    text-align: left;
    flex: 1;
  }

  .copy-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #f7b731;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: rgba(247, 183, 49, 0.2);
  }

  .copy-btn.copied {
    background: #27ae60;
    color: white;
  }

  .footer {
    margin-top: 32px;
    color: #555;
    font-size: 12px;
  }

  .footer a {
    color: #f7b731;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="emoji">☕</div>
  <h1>请我喝杯咖啡</h1>
  <p class="subtitle">
    如果我的代码帮到了你，赏我一杯咖啡钱吧~<br>
    每一笔支持都是我写更多好东西的动力 🚀
  </p>

  <div class="wallet-tabs">
    <button class="tab active" onclick="switchTab('btc')">₿ BTC</button>
    <button class="tab" onclick="switchTab('eth')">Ξ ETH</button>
    <button class="tab" onclick="switchTab('usdt')">₮ USDT</button>
  </div>

  <!-- BTC -->
  <div class="wallet-panel active" id="panel-btc">
    <div class="qr-wrapper">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=YOUR_BTC_ADDRESS_HERE"
           alt="BTC QR Code" id="qr-btc">
    </div>
    <div class="address-box">
      <span class="address-text" id="addr-btc">YOUR_BTC_ADDRESS_HERE</span>
      <button class="copy-btn" onclick="copyAddress('YOUR_BTC_ADDRESS_HERE', this)">📋 复制</button>
    </div>
  </div>

  <!-- ETH -->
  <div class="wallet-panel" id="panel-eth">
    <div class="qr-wrapper">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x8dd3979a023f4d90ddba993199f330439877cf8e"
           alt="ETH QR Code" id="qr-eth">
    </div>
    <div class="address-box">
      <span class="address-text" id="addr-eth">0x8dd3979a023f4d90ddba993199f330439877cf8e</span>
      <button class="copy-btn" onclick="copyAddress('0x8dd3979a023f4d90ddba993199f330439877cf8e', this)">📋 复制</button>
    </div>
  </div>

  <!-- USDT (ERC20) -->
  <div class="wallet-panel" id="panel-usdt">
    <div class="qr-wrapper">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x8dd3979a023f4d90ddba993199f330439877cf8e"
           alt="USDT QR Code" id="qr-usdt">
    </div>
    <div class="address-box">
      <span class="address-text" id="addr-usdt">0x8dd3979a023f4d90ddba993199f330439877cf8e</span>
      <button class="copy-btn" onclick="copyAddress('0x8dd3979a023f4d90ddba993199f330439877cf8e', this)">📋 复制</button>
    </div>
  </div>

  <div class="footer">
    感谢你的支持 ❤️ &nbsp;|&nbsp;
    <a href="https://github.com" target="_blank">我的 GitHub</a>
  </div>
</div>

<script>
  function switchTab(type) {
    // 切换面板
    document.querySelectorAll('.wallet-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + type).classList.add('active');
    // 切换标签样式
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
  }

  function copyAddress(addr, btn) {
    navigator.clipboard.writeText(addr).then(() => {
      btn.textContent = '✅ 已复制';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 复制';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
